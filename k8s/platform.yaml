apiVersion: v1
kind: Namespace
metadata:
  name: mitocode
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: microservices-config
  namespace: mitocode
data:
  EUREKA_URL: http://discovery-server:8761/eureka/
  KAFKA_BOOTSTRAP_SERVERS: broker:29092
  MONGODB_URI: mongodb://mitocode:mitocode@mongo-service:27017/mitocodedb?authSource=admin
---
apiVersion: v1
kind: Secret
metadata:
  name: microservices-secrets
  namespace: mitocode
type: Opaque
stringData:
  JWT_SIGNING_KEY: change-this-production-jwt-key-32chars
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: discovery-server, namespace: mitocode }
spec:
  replicas: 1
  selector: { matchLabels: { app: discovery-server } }
  template:
    metadata: { labels: { app: discovery-server } }
    spec:
      containers:
        - name: discovery-server
          image: IMAGE_REGISTRY/discovery-server:IMAGE_TAG
          ports: [{ containerPort: 8761 }]
          readinessProbe: { httpGet: { path: /actuator/health, port: 8761 }, initialDelaySeconds: 20, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: discovery-server, namespace: mitocode }
spec: { selector: { app: discovery-server }, ports: [{ port: 8761, targetPort: 8761 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: product-service, namespace: mitocode }
spec:
  replicas: 2
  selector: { matchLabels: { app: product-service } }
  template:
    metadata: { labels: { app: product-service } }
    spec:
      containers:
        - name: product-service
          image: IMAGE_REGISTRY/product-service:IMAGE_TAG
          ports: [{ containerPort: 9001 }]
          envFrom: [{ configMapRef: { name: microservices-config } }, { secretRef: { name: microservices-secrets } }]
          resources: { requests: { cpu: 100m, memory: 256Mi }, limits: { cpu: 500m, memory: 512Mi } }
          readinessProbe: { httpGet: { path: /actuator/health, port: 9001 }, initialDelaySeconds: 30, periodSeconds: 10 }
---
apiVersion: v1
kind: Service
metadata: { name: product-service, namespace: mitocode }
spec: { selector: { app: product-service }, ports: [{ port: 9001, targetPort: 9001 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: product-query-service, namespace: mitocode }
spec:
  replicas: 2
  selector: { matchLabels: { app: product-query-service } }
  template:
    metadata: { labels: { app: product-query-service } }
    spec:
      containers:
        - name: product-query-service
          image: IMAGE_REGISTRY/product-query-service:IMAGE_TAG
          ports: [{ containerPort: 9005 }]
          envFrom: [{ configMapRef: { name: microservices-config } }]
---
apiVersion: v1
kind: Service
metadata: { name: product-query-service, namespace: mitocode }
spec: { selector: { app: product-query-service }, ports: [{ port: 9005, targetPort: 9005 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: audit-service, namespace: mitocode }
spec:
  replicas: 1
  selector: { matchLabels: { app: audit-service } }
  template:
    metadata: { labels: { app: audit-service } }
    spec:
      containers:
        - name: audit-service
          image: IMAGE_REGISTRY/audit-service:IMAGE_TAG
          ports: [{ containerPort: 9004 }]
          envFrom: [{ configMapRef: { name: microservices-config } }]
---
apiVersion: v1
kind: Service
metadata: { name: audit-service, namespace: mitocode }
spec: { selector: { app: audit-service }, ports: [{ port: 9004, targetPort: 9004 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: order-saga-service, namespace: mitocode }
spec:
  replicas: 1
  selector: { matchLabels: { app: order-saga-service } }
  template:
    metadata: { labels: { app: order-saga-service } }
    spec:
      containers:
        - name: order-saga-service
          image: IMAGE_REGISTRY/order-saga-service:IMAGE_TAG
          ports: [{ containerPort: 9006 }]
          envFrom: [{ configMapRef: { name: microservices-config } }]
---
apiVersion: v1
kind: Service
metadata: { name: order-saga-service, namespace: mitocode }
spec: { selector: { app: order-saga-service }, ports: [{ port: 9006, targetPort: 9006 }] }
---
apiVersion: apps/v1
kind: Deployment
metadata: { name: cloud-gateway, namespace: mitocode }
spec:
  replicas: 2
  selector: { matchLabels: { app: cloud-gateway } }
  template:
    metadata: { labels: { app: cloud-gateway } }
    spec:
      containers:
        - name: cloud-gateway
          image: IMAGE_REGISTRY/cloud-gateway:IMAGE_TAG
          ports: [{ containerPort: 9080 }]
          envFrom: [{ configMapRef: { name: microservices-config } }, { secretRef: { name: microservices-secrets } }]
---
apiVersion: v1
kind: Service
metadata: { name: cloud-gateway, namespace: mitocode }
spec:
  type: LoadBalancer
  selector: { app: cloud-gateway }
  ports: [{ port: 80, targetPort: 9080 }]
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata: { name: product-service, namespace: mitocode }
spec:
  scaleTargetRef: { apiVersion: apps/v1, kind: Deployment, name: product-service }
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target: { type: Utilization, averageUtilization: 70 }
