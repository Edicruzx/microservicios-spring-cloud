apiVersion: v1
kind: Namespace
metadata:
  name: mitocode
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: config-server
  namespace: mitocode
  labels:
    app: config-server
spec:
  replicas: REPLICA_COUNT
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: IMAGE_REGISTRY/config-server:IMAGE_TAG
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 9000
          env:
            - name: CONFIG_SERVER_PORT
              value: "9000"
            - name: EUREKA_URL
              value: http://discovery-server:8761/eureka/
            - name: CONFIG_REPO_PATH
              value: /app/config-server-files
            - name: EUREKA_INSTANCE_PREFER_IP_ADDRESS
              value: "true"
          volumeMounts:
            - name: config-server-files
              mountPath: /app/config-server-files
              readOnly: true
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: config-server-files
          configMap:
            name: config-server-files
---
apiVersion: v1
kind: Service
metadata:
  name: config-server
  namespace: mitocode
  labels:
    app: config-server
spec:
  selector:
    app: config-server
  ports:
    - name: http
      port: 9000
      targetPort: http
  type: ClusterIP
