server:
  port: ${CONFIG_SERVER_PORT:9000}

spring:
  profiles:
    active: native
  application:
    name: config-server
  cloud:
    config:
      server:
        native:
          search-locations:
            - file:${CONFIG_REPO_PATH:${user.dir}/config-server-files}
            - file:${CONFIG_REPO_PARENT_PATH:${user.dir}/../config-server-files}

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

encrypt:
  key: mitocode
