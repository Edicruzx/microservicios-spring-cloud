apiVersion: 1

datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: true

  - name: Zipkin
    uid: zipkin
    type: zipkin
    access: proxy
    url: http://host.docker.internal:9411
    editable: true
    jsonData:
      tracesToLogsV2:
        datasourceUid: prometheus
      nodeGraph:
        enabled: true