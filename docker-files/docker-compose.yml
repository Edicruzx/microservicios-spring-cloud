services:

  mongo-service:
    image: mongo
    container_name: mitocode-mongo
    ports:
      - "27018:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: mitocode
      MONGO_INITDB_ROOT_PASSWORD: mitocode
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    networks:
      - mitocode

  mongo-express:
    image: mongo-express
    container_name: mitocode-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: mitocode
      ME_CONFIG_MONGODB_ADMINPASSWORD: mitocode
      ME_CONFIG_MONGODB_URL: mongodb://mitocode:mitocode@mongo-service:27017
    depends_on:
      - mongo-service
    networks:
      - mitocode

  postgres-mitocode:
    image: postgres:13.1-alpine
    container_name: mitocode-postgresql
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: mitocode
      POSTGRES_PASSWORD: mitocode
      POSTGRES_DB: mitocodedb
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - mitocode

  zipkin:
    image: openzipkin/zipkin
    container_name: mitocode-zipkin
    ports:
      - "9411:9411"
    networks:
      - mitocode

  prometheus:
    image: prom/prometheus
    container_name: mitocode-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/config:/etc/prometheus/
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    networks:
      - mitocode

  grafana:
    image: grafana/grafana-oss
    container_name: mitocode-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SERVER_DOMAIN=localhost
    networks:
      - mitocode

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: mitocode-kafka-zookeeper
    hostname: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
      - zookeeper-log:/var/lib/zookeeper/log
    networks:
      - mitocode

  broker:
    image: confluentinc/cp-kafka:7.6.1
    container_name: mitocode-kafka-broker
    hostname: broker
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_INTERNAL://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://broker:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - mitocode

  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    container_name: mitocode-keycloak
    command: start-dev --import-realm
    ports:
      - "8180:8080"
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin
    volumes:
      - ./keycloak/mitocode-realm.json:/opt/keycloak/data/import/mitocode-realm.json:ro
      - keycloak-data:/opt/keycloak/data
    networks:
      - mitocode

networks:
  mitocode:
    external: true
    name: mitocode-network

volumes:
  mongo-data:
  mongo-config:
  postgres-data:
  prometheus-data:
  grafana-data:
  zookeeper-data:
  zookeeper-log:
  kafka-data:
  keycloak-data:
