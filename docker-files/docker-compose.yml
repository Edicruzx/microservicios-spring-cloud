version: "3.9"

services:

  mongo-service:
    image: mongo
    container_name: mitocode-mongo-service
    ports:
      - "27017:27017"
    networks:
      - mitocode

  mongo-express:
    image: mongo-express
    container_name: mitocode-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongo-service
    networks:
      - mitocode

networks:
  mitocode:
    external: true
    name: mitocode-network