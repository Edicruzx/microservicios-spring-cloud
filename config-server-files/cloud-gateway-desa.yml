server:
  port: ${GATEWAY_SERVER_PORT:9080}

mitocode:
  security:
    key: ${JWT_SIGNING_KEY:mitocode-microservices-jwt-key-2026}

security:
  provider: ${SECURITY_PROVIDER:legacy}

spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/mitocode}
  main:
    web-application-type: reactive

  cloud:
    gateway:
      routes:
        # Strangler: los consumidores antiguos pueden mantener el modelo de escritura
        # enviando X-Use-Legacy=true; el resto migra al modelo CQRS de lectura.
        - id: product-catalog-legacy
          uri: lb://product-service
          order: -2
          predicates:
            - Path=/api/catalog/**
            - Header=X-Use-Legacy, true
          filters:
            - RewritePath=/api/catalog(?<segment>/?.*), /product${segment}

        - id: product-catalog-query
          uri: lb://product-query-service
          order: -1
          predicates:
            - Path=/api/catalog/**
          filters:
            - RewritePath=/api/catalog(?<segment>/?.*), /product-query${segment}

        - id: order-saga-service
          uri: lb://order-saga-service
          predicates:
            - Path=/api/order-saga-service/**
          filters:
            - StripPrefix=2

        - id: product-query-service
          uri: lb://product-query-service
          predicates:
            - Path=/api/product-query-service/**
          filters:
            - StripPrefix=2

        - id: audit-service
          uri: lb://audit-service
          predicates:
            - Path=/api/audit-service/**
          filters:
            - StripPrefix=2

        - id: product-service
          uri: lb://product-service
          predicates:
            - Path=/api/product-service/**
          filters:
            - StripPrefix=2
            - name: CircuitBreaker
              args:
                name: product-cb
                fallbackUri: forward:/api/user-service/user
                statusCodes:
                  - 400
                  - 401
                  - 403
                  - 500
                  - 503
                  - 504

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/user-service/**
          filters:
            - StripPrefix=2
            - AddRequestHeader=MitocodeKey, MitocodeValue
            - AddResponseHeader=MitocodeHeader, MitocodeHeaderValue1

eureka:
  client:
    fetch-registry: true
    register-with-eureka: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

resilience4j:
  circuitbreaker:
    configs:
      circuitBreakerProduct:
        slidingWindowSize: 10
        failureRateThreshold: 80
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 8
        slowCallDurationThreshold: 200s
        slowCallRateThreshold: 50
    instances:
      product-cb:
        baseConfig: circuitBreakerProduct

  timelimiter:
    configs:
      timeLimiterProduct:
        timeoutDuration: 1300ms
    instances:
      product-cb:
        baseConfig: timeLimiterProduct

management:
  tracing:
    sampling:
      probability: 1.0
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
