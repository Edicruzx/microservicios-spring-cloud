server:
  port: ${CUSTOM.SERVER.PORT:9001}

eureka:
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  data:
    mongodb:
      database: mitocodedb
      uri: mongodb://mitocode:mitocode@localhost:27018/mitocodedb?authSource=admin

encrypt:
  key: mitocode

info:
  app:
    name: Product Service Microservice
    description: Módulo de la arquitectura que disponibiliza información de los productos
    version: 1.0

management:
  tracing:
    sampling:
      probability: 1.0
  zipkin:
    tracing:
      endpoint: http://localhost:9411/api/v2/spans
  endpoints:
    web:
      exposure:
        include: "*"
      base-path: /actuator

  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: true

springdoc:
  api-docs:
    path: /api-docs
    enable: true
swagger-ui:
  path: swagger-ui.html
  enable: true