server:
  port: ${CUSTOM.SERVER.PORT:8088}

eureka:
  client:
    fetchRegistry: true
    registerWithEureka: true
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

spring:
  data:
    mongodb:
      uri: mongodb://mitocode:mitocode@localhost:27018/mitocodedb?authSource=admin

mitocode:
  security:
    client: mitocode
    secret: mitocode
    key: mitocode